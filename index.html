<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VELFARO · DYNAMIC PUZZLE SYSTEM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: black;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-transform: uppercase;
            position: relative;
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: #0f0;
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            border-top: 1px solid #0f0;
            z-index: 10000;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            text-transform: none;
            backdrop-filter: blur(2px);
        }
        .phase {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: black;
            padding: 20px;
            z-index: 1;
        }
        .phase.active { display: flex; }
        .glitch { animation: glitch 1s infinite; }
        @keyframes glitch {
            0% { text-shadow: 2px 0 red, -2px 0 blue; }
            50% { text-shadow: -2px 0 red, 2px 0 blue; }
            100% { text-shadow: 2px 0 red, -2px 0 blue; }
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots {
            0%,20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%,100% { content: '...'; }
        }
        .typewriter {
            overflow: hidden;
            border-right: 2px solid #0f0;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: 0.15em;
            animation: typing 2s steps(20, end), blink-caret 0.75s step-end infinite;
        }
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes blink-caret {
            from,to { border-color: transparent; }
            50% { border-color: #0f0; }
        }
        .velfaro-main {
            font-size: 5rem;
            font-weight: bold;
            color: #b00;
            text-shadow: 0 0 20px #f00;
            letter-spacing: 8px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; text-shadow: 0 0 20px #f00; }
            50% { opacity: 0.7; text-shadow: 0 0 40px #f00; }
            100% { opacity: 1; text-shadow: 0 0 20px #f00; }
        }
        .velfaro-sub {
            font-size: 1.8rem;
            color: #fa0;
            margin-bottom: 30px;
        }
        .velfaro-warning {
            font-size: 1rem;
            color: #f44;
            border: 1px solid #f44;
            padding: 8px 16px;
            background: rgba(255,0,0,0.2);
            box-shadow: 0 0 15px #f00;
        }
        .access-line {
            font-size: 2.5rem;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
        .access-sub {
            font-size: 1.2rem;
            color: #0a0;
            margin-top: 20px;
        }
        .input-box {
            background: #111;
            padding: 40px;
            border: 2px solid #0f0;
            box-shadow: 0 0 30px #0f0;
            width: 90%;
            max-width: 500px;
        }
        .input-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #0f0;
            text-decoration: underline;
        }
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.9rem;
            color: #0f0;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            background: black;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 12px 15px;
            font-size: 1.2rem;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-width: 2px;
            box-shadow: 0 0 20px #0f0;
        }
        .action-btn {
            background: #0f0;
            color: black;
            border: none;
            font-size: 1.5rem;
            padding: 15px 30px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: 0.3s;
            width: 100%;
        }
        .action-btn:hover {
            background: #0a0;
            box-shadow: 0 0 40px #0f0;
        }
        .puzzle-box {
            background: #111;
            padding: 40px;
            border: 2px solid #0f0;
            box-shadow: 0 0 30px #0f0;
            width: 90%;
            max-width: 500px;
        }
        .puzzle-question {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: #ff0;
            text-shadow: 0 0 10px #ff0;
        }
        .puzzle-input {
            background: black;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 1.5rem;
            padding: 10px 20px;
            width: 100%;
            text-align: center;
            font-family: inherit;
        }
        .puzzle-feedback {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 3rem;
        }
        .correct { color: #0f0; }
        .wrong { color: #f00; }
        .form-container {
            background: #111;
            padding: 40px;
            border: 2px solid #0f0;
            width: 90%;
            max-width: 500px;
        }
        .form-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #f00;
            text-decoration: underline;
        }
        #transmission-message {
            margin-top: 30px;
            font-size: 1.8rem;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 20px;
            background: rgba(0,255,0,0.1);
            display: none;
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        #session-ended {
            position: absolute;
            width: 100%;
            height: 100%;
            background: black;
            color: red;
            font-size: 3rem;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: finalGlitch 2s infinite;
        }
        @keyframes finalGlitch {
            0% { text-shadow: 5px 0 red, -5px 0 blue; }
            25% { text-shadow: -5px 0 red, 5px 0 blue; }
            50% { text-shadow: 5px 5px red, -5px -5px blue; }
            75% { text-shadow: -5px -5px red, 5px 5px blue; }
            100% { text-shadow: 5px 0 red, -5px 0 blue; }
        }
        .error-message {
            color: #f00;
            margin-top: 10px;
            font-size: 1rem;
        }
        #background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.03) 0px, rgba(0,0,0,0.5) 2px, transparent 3px);
            pointer-events: none;
            z-index: 0;
        }
        @media (max-width: 600px) {
            .velfaro-main { font-size: 3rem; letter-spacing: 4px; }
            .velfaro-sub { font-size: 1.2rem; }
            .access-line { font-size: 1.8rem; }
            .input-title { font-size: 1.5rem; }
            .puzzle-question { font-size: 2rem; }
            .action-btn { font-size: 1.2rem; padding: 12px; }
            .footer { font-size: 12px; padding: 5px 0; }
            .puzzle-feedback { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div id="background-overlay"></div>

    <!-- تذييل حقوق النشر -->
    <div class="footer">
        © 2026 Hamza Ahmed. All Rights Reserved. | تصميم وبرمجة: حمزة أحمد
    </div>

    <!-- شاشة انتهاء الجلسة -->
    <div id="session-ended">
        SESSION TERMINATED
    </div>

    <!-- المرحلة 1: افتتاحية -->
    <div id="phase1" class="phase active">
        <div id="phase1-loading" style="font-size: 3rem;">LOADING<span class="loading-dots"></span></div>
        <div id="phase1-content" style="display: none;">
            <div class="velfaro-main">VELFARO</div>
            <div class="velfaro-sub">Secure Archive Division</div>
            <div class="velfaro-warning typewriter">Unauthorized access is prohibited</div>
        </div>
    </div>

    <!-- المرحلة 2: تحميل وهمي -->
    <div id="phase2" class="phase">
        <div class="access-line">LOADING<span class="loading-dots"></span></div>
        <div class="access-sub">ACCESSING FILE <span id="file-progress">0%</span></div>
    </div>

    <!-- المرحلة 3: إدخال البيانات (السيريال والـ ID) -->
    <div id="phase3" class="phase">
        <div class="input-box">
            <div class="input-title">ENTER CREDENTIALS</div>
            <div class="form-group">
                <label>SERIAL NUMBER</label>
                <input type="text" id="serialNumber" placeholder="e.g., SR-12345">
            </div>
            <div class="form-group">
                <label>ASSIGNED ID</label>
                <input type="text" id="assignedId" placeholder="e.g., AGENT-007">
            </div>
            <button id="fetch-puzzle-btn" class="action-btn">RETRIEVE PUZZLE</button>
            <div id="input-error" class="error-message"></div>
        </div>
    </div>

    <!-- المرحلة 4: عرض اللغز (يُجلب من Google Sheets) -->
    <div id="phase4" class="phase">
        <div class="puzzle-box">
            <div class="puzzle-question" id="displayed-puzzle">Loading puzzle...</div>
            <input type="text" id="puzzle-answer" class="puzzle-input" placeholder="ENTER ANSWER" autofocus>
            <button id="check-answer-btn" class="action-btn">CHECK ANSWER</button>
            <div id="puzzle-feedback" class="puzzle-feedback"></div>
            <button id="next-after-correct" class="action-btn" style="display: none;">CONTINUE</button>
        </div>
    </div>

    <!-- المرحلة 5: النموذج النهائي (عرض البيانات وإرسالها) -->
    <div id="phase5" class="phase">
        <div class="form-container">
            <div class="form-title">CASE SUBMISSION FORM</div>
            <div class="form-group">
                <label>FULL NAME (OPTIONAL)</label>
                <input type="text" id="final-name" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>SERIAL NUMBER</label>
                <input type="text" id="final-serial" readonly>
            </div>
            <div class="form-group">
                <label>ASSIGNED ID</label>
                <input type="text" id="final-id" readonly>
            </div>
            <div class="form-group">
                <label>YOUR ANSWER</label>
                <input type="text" id="final-answer" readonly>
            </div>
            <div class="form-group">
                <label>RESULT</label>
                <input type="text" id="final-result" readonly>
            </div>
            <button id="submit-form" class="action-btn">SUBMIT CASE</button>
            <div id="transmission-message">TRANSMISSION RECEIVED</div>
        </div>
    </div>

    <script>
        // ⚠️ ضع رابط Google Sheets Web App هنا
        const googleSheetsURL = 'https://script.google.com/macros/s/AKfycbyBlGq_IAngmpJ4k6an_QKgQAljI_uMWJqF2ZxnhvzNuHfQjxRB8K1y59wNvVU_oDa5/exec';

        // عناصر الصفحة
        const phase1 = document.getElementById('phase1');
        const phase2 = document.getElementById('phase2');
        const phase3 = document.getElementById('phase3');
        const phase4 = document.getElementById('phase4');
        const phase5 = document.getElementById('phase5');
        const sessionEnded = document.getElementById('session-ended');
        const loading1 = document.getElementById('phase1-loading');
        const content1 = document.getElementById('phase1-content');
        const fileProgress = document.getElementById('file-progress');
        const serialNumber = document.getElementById('serialNumber');
        const assignedId = document.getElementById('assignedId');
        const fetchPuzzleBtn = document.getElementById('fetch-puzzle-btn');
        const inputError = document.getElementById('input-error');
        const displayedPuzzle = document.getElementById('displayed-puzzle');
        const puzzleAnswer = document.getElementById('puzzle-answer');
        const checkAnswerBtn = document.getElementById('check-answer-btn');
        const puzzleFeedback = document.getElementById('puzzle-feedback');
        const nextAfterCorrect = document.getElementById('next-after-correct');
        const finalName = document.getElementById('final-name');
        const finalSerial = document.getElementById('final-serial');
        const finalId = document.getElementById('final-id');
        const finalAnswer = document.getElementById('final-answer');
        const finalResult = document.getElementById('final-result');
        const submitForm = document.getElementById('submit-form');
        const transmissionMsg = document.getElementById('transmission-message');

        // بيانات الجلسة
        let sessionData = {
            serial: '',
            id: '',
            correctAnswer: '',
            rowIndex: null,
            answerGiven: '',
            result: ''
        };

        // دالة التنقل
        function goToPhase(fromPhase, toPhase) {
            fromPhase.classList.remove('active');
            toPhase.classList.add('active');
        }

        // تسلسل المرحلتين 1 و 2 (تلقائي)
        setTimeout(() => {
            loading1.style.display = 'none';
            content1.style.display = 'block';
            setTimeout(() => {
                goToPhase(phase1, phase2);
                let progress = 0;
                const interval = setInterval(() => {
                    if (!phase2.classList.contains('active')) {
                        clearInterval(interval);
                        return;
                    }
                    progress += Math.floor(Math.random() * 10) + 5;
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(interval);
                        setTimeout(() => goToPhase(phase2, phase3), 500);
                    }
                    fileProgress.textContent = progress + '%';
                }, 400);
            }, 3000);
        }, 1500);

        // مرحلة 3: جلب اللغز من Google Sheets
        fetchPuzzleBtn.addEventListener('click', async () => {
            const serial = serialNumber.value.trim();
            const id = assignedId.value.trim();

            if (!serial || !id) {
                inputError.textContent = 'SERIAL AND ID ARE REQUIRED';
                return;
            }

            // تخزين البيانات مؤقتاً
            sessionData.serial = serial;
            sessionData.id = id;

            // إظهار رسالة التحميل في الزر
            fetchPuzzleBtn.textContent = 'VERIFYING...';
            fetchPuzzleBtn.disabled = true;

            try {
                const response = await fetch(googleSheetsURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'verify',
                        serial: serial,
                        id: id
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // حفظ اللغز والإجابة الصحيحة
                    sessionData.correctAnswer = data.answer;
                    sessionData.rowIndex = data.rowIndex;
                    displayedPuzzle.textContent = data.puzzle;

                    // الانتقال إلى مرحلة اللغز
                    goToPhase(phase3, phase4);
                    inputError.textContent = '';
                    // إعادة تعيين حقل الإجابة والفييدباك
                    puzzleAnswer.value = '';
                    puzzleFeedback.textContent = '';
                    puzzleFeedback.className = 'puzzle-feedback';
                    nextAfterCorrect.style.display = 'none';
                } else {
                    inputError.textContent = 'INVALID SERIAL OR ID';
                }
            } catch (error) {
                console.error(error);
                inputError.textContent = 'CONNECTION ERROR';
            } finally {
                fetchPuzzleBtn.textContent = 'RETRIEVE PUZZLE';
                fetchPuzzleBtn.disabled = false;
            }
        });

        // مرحلة 4: التحقق من الإجابة
        checkAnswerBtn.addEventListener('click', () => {
            const answer = puzzleAnswer.value.trim();
            if (!answer) {
                puzzleFeedback.textContent = 'ENTER AN ANSWER';
                puzzleFeedback.className = 'puzzle-feedback wrong';
                return;
            }

            sessionData.answerGiven = answer;
            const isCorrect = (answer.toLowerCase() === sessionData.correctAnswer.toLowerCase());
            sessionData.result = isCorrect ? 'CORRECT' : 'WRONG';

            if (isCorrect) {
                puzzleFeedback.textContent = '✔️ CORRECT';
                puzzleFeedback.className = 'puzzle-feedback correct';
                // إظهار زر المتابعة
                nextAfterCorrect.style.display = 'block';
                // إخفاء زر التحقق (اختياري)
                checkAnswerBtn.style.display = 'none';
            } else {
                puzzleFeedback.textContent = '❌ WRONG';
                puzzleFeedback.className = 'puzzle-feedback wrong';
                // يمكنه المحاولة مرة أخرى
            }
        });

        // زر المتابعة بعد الإجابة الصحيحة
        nextAfterCorrect.addEventListener('click', () => {
            // تعبئة الحقول في النموذج النهائي
            finalSerial.value = sessionData.serial;
            finalId.value = sessionData.id;
            finalAnswer.value = sessionData.answerGiven;
            finalResult.value = sessionData.result;

            goToPhase(phase4, phase5);
        });

        // مرحلة 5: إرسال البيانات إلى Google Sheets (سجل المحاولات)
        submitForm.addEventListener('click', async () => {
            const name = finalName.value.trim() || 'ANONYMOUS';
            transmissionMsg.style.display = 'block';

            try {
                await fetch(googleSheetsURL, {
                    method: 'POST',
                    mode: 'no-cors', // لأننا لا نحتاج لقراءة الرد
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'submit',
                        fullName: name,
                        serial: sessionData.serial,
                        id: sessionData.id,
                        answerGiven: sessionData.answerGiven,
                        correctAnswer: sessionData.correctAnswer,
                        result: sessionData.result,
                        rowIndex: sessionData.rowIndex
                    })
                });

                // إغلاق الجلسة بعد ثانيتين
                setTimeout(() => {
                    document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
                    sessionEnded.style.display = 'flex';
                }, 2000);
            } catch (error) {
                console.error(error);
                alert('فشل الإرسال');
                transmissionMsg.style.display = 'none';
            }
        });

        // تأثيرات flickering عشوائية
        setInterval(() => {
            document.body.style.animation = 'none';
            setTimeout(() => {
                document.body.style.animation = 'flicker 0.2s';
            }, 50);
        }, 8000);

        // تغيير عنوان الصفحة ديناميكياً
        const titles = ['VELFARO', 'SECURE ARCHIVE', 'CLASSIFIED', 'IDENTIFY'];
        let idx = 0;
        setInterval(() => {
            document.title = titles[idx % titles.length] + ' █';
            idx++;
        }, 1200);
    </script>

    <style>
        @keyframes flicker {
            0% { opacity: 1; }
            10% { opacity: 0.8; background-color: #111; }
            20% { opacity: 1; }
            30% { opacity: 0.9; background-color: #200; }
            40% { opacity: 1; }
            100% { opacity: 1; }
        }
    </style>
</body>
</html>
